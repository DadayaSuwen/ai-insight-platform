# Nginx configuration for AI Insight Platform web container.
#
# Reverse-proxies NestJS endpoints and serves the SPA with a fallback to
# /index.html. SSE endpoints (/chat/stream, /ai/process) require buffering
# and cache to be disabled so events stream live.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        font/ttf
        image/svg+xml;

    # Hashed Vite assets — long cache with immutable directive
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SSE + chat endpoints — disable proxy buffering so events stream as they arrive
    location ~ ^/(chat|ai)/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Regular JSON API
    location /database/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — any unmatched route returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx default 1MB client_max_body_size is fine for chat input.
    # Adjust here if you ever upload files via the API.
}