[phases.install]
cmds = [
  "corepack enable pnpm && corepack prepare pnpm@9.0.0 --activate && cd ../.. && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd ../.. && pnpm --filter @workspace/types build",
  "cd ../.. && pnpm --filter @ai-insight/server exec prisma generate",
  "cd ../.. && pnpm --filter @ai-insight/server rebuild duckdb duckdb-async",
  "cd ../.. && pnpm --filter @ai-insight/server run build"
]

[start]
cmd = "cd apps/server && pnpm exec prisma db push && pnpm exec ts-node prisma/seed.ts && node dist/main.js"
