name: ai-insight-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_insight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_insight"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: .docker/Dockerfile.server
    container_name: ai-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://app:password@postgres:5432/ai_insight
      DATABASE_HOST: postgres
      DB_USER: app
      DB_PASSWORD: password
      DB_NAME: ai_insight
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      # [Sprint 4] 必须注入 32 字节 base64 加密密钥,缺则后端启动失败
      # 生成: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      DB_CONFIG_ENCRYPTION_KEY: ${DB_CONFIG_ENCRYPTION_KEY:?DB_CONFIG_ENCRYPTION_KEY must be set (32-byte base64)}
      # [Sprint 5] JWT 签名密钥 (≥32 字符),缺则后端启动失败
      # 生成: openssl rand -base64 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (at least 32 chars)}
    ports:
      - "3000:3000"
    # [Sprint 5.6] CSV 文件不再持久化 — 数据已灌入 PG 主库
    # volumes 保留仅用于 multer 临时上传 (用完即删)
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: /
    container_name: ai-web
    depends_on:
      server:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
  # [Sprint 5.6] uploads_data 卷已移除 — CSV 数据存入 PG 主库, 不再依赖文件持久化