# railpack.toml — Railway Railpack 多服务部署配置
#
# 一个仓库同时部署两个独立服务:
#   - server : NestJS API (apps/server)
#   - web    : Vite 静态构建 + nginx (apps/web)
#
# 关键事实: Railway 上两个服务是独立的容器, 不共享 docker 网络,
# 所以 web 不能用 nginx 反代访问 server。 web 在构建期通过
# VITE_API_BASE_URL 注入 server 的公网 Railway URL, 浏览器直接请求 server。

# =================================================================
# Server: NestJS API
# =================================================================
[[services]]
name = "server"
root = "apps/server"

[services.build]
builder = "node"
buildCommand = """
corepack enable pnpm && corepack prepare pnpm@9.0.0 --activate && \
cd ../.. && pnpm install --frozen-lockfile && \
pnpm --filter @workspace/types build && \
cd apps/server && \
pnpm rebuild duckdb duckdb-async && \
pnpm exec prisma generate && \
pnpm exec nest build
"""

[services.deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"

[services.variables]
NODE_ENV = "production"
PORT = "3000"
# 关掉 node-cron 主动洞察 — Railway 容器无流量时会休眠, cron 不触发
DISABLE_INSIGHTS_CRON = "1"

# 以下变量在 Railway UI 手动设置 (不要进文件):
#   DATABASE_URL              Railway Postgres plugin 自动注入, 末尾加 ?sslmode=require
#   JWT_SECRET                openssl rand -base64 32  (>=32 字符)
#   DB_CONFIG_ENCRYPTION_KEY  node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
#   FRONTEND_ORIGIN           web 服务的 Railway URL (如 https://web-production-xxxx.up.railway.app)
#                             多个用逗号分隔
#   INIT_SEED                 首次部署设 true 创建默认管理员, 之后改 false

# =================================================================
# Web: Vite 静态构建, nginx serve
# =================================================================
[[services]]
name = "web"
root = "apps/web"

[services.build]
builder = "node"
buildCommand = """
corepack enable pnpm && corepack prepare pnpm@9.0.0 --activate && \
cd ../.. && pnpm install --frozen-lockfile && \
pnpm --filter @workspace/types build && \
cd apps/web && \
pnpm exec vite build
"""

# 构建期变量 — Vite 会把 import.meta.env.VITE_API_BASE_URL 硬编码进 bundle
# 必须填 server 服务的 Railway 公网 URL, 例如:
#   https://server-production-xxxx.up.railway.app
[services.variables]
# 占位符, Railway 部署后在 UI 里改成 server 的真实 URL 再重新部署
VITE_API_BASE_URL = "https://REPLACE_WITH_SERVER_URL.up.railway.app"

[services.deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
