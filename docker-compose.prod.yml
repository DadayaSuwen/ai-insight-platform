name: ai-insight-platform-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: .docker/Dockerfile.server
    container_name: ai-prod-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      DATABASE_HOST: postgres
      DB_USER: ${DB_USER:?DB_USER must be set}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:?DB_NAME must be set}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN must be set}
      INIT_SEED: ${INIT_SEED:-false}
      SEED_ON_BOOT: "false"
      DB_CONFIG_ENCRYPTION_KEY: ${DB_CONFIG_ENCRYPTION_KEY:?DB_CONFIG_ENCRYPTION_KEY must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    container_name: ai-prod-web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
    name: ai_insight_platform_prod_postgres_data
